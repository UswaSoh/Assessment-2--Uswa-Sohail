<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="detail-page">
<header>
<h1> Book Haven</h1>
<button class="home-btn" onclick="goHome()"> ← Back Home</button>
</header>

<section class="detail-container">
<div class="detail-image">
<img id="bookImage"></div>

<div class="detail-info">
<h2 id="bookTitle"> </h2>

<p>
<strong> Author: </strong>
<span id="bookAuthor"> </span>
</p>

<p>
<strong> Genre: </strong>
<span id="bookGenre"> </span>
</p>

<div class="description-box">
<h3>Description</h3>
<p id="bookDescription"></p>
</div>

<a
id="amazonLink"
target="_blank"
class="detail-btn">
Amazon
</a>

<a
id="pdfLink"
target="_blank"
class="detail-btn">
Read / Download
</a>

<button
class="detail-btn"
onclick="saveTracker()">
Add To Tracker
</button>

</div>
</section>
<script src="bookData.js"></script>
<script src="bookDetail.js"></script> 
</body>
</html>
